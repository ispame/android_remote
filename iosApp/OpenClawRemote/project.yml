name: OpenClawRemote
options:
  bundleIdPrefix: boson-tech
  deploymentTarget:
    iOS: "15.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_FILE: Info.plist
    CODE_SIGN_STYLE: Automatic
    PRODUCT_BUNDLE_IDENTIFIER: boson-tech.OpenClawRemote
    GENERATE_INFOPLIST_FILE: NO
    SWIFT_OBJC_BRIDGING_HEADER: Sources/OpenClawRemote-Bridging-Header.h

targets:
  OpenClawRemote:
    type: application
    platform: iOS
    sources:
      - path: Assets.xcassets
      - path: Sources
      - path: LaunchScreen.storyboard
    settings:
      base:
        PRODUCT_NAME: OpenClawRemote
        DEVELOPMENT_TEAM: ""
        # Personal development teams cannot sign the Push Notifications entitlement.
        # Use OpenClawRemotePush.entitlements only with a paid Apple Developer Team.
        CODE_SIGN_ENTITLEMENTS: OpenClawRemote.entitlements
